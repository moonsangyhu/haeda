server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html & flutter_bootstrap.js: never cache (always fetch latest on refresh)
    location ~ ^/(index\.html|flutter_bootstrap\.js|main\.dart\.js|flutter\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Fingerprinted assets (main.dart.js, *.part.js, etc.): cache aggressively
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|ico|svg)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: all routes fall back to index.html (GoRouter handles client-side routing)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
